worker_processes auto;
pid /opt/project/web_worker/openresty/logs/openresty.pid;
error_log /opt/project/web_worker/openresty/logs/error.log warn;

events {
  worker_connections 1024;
}

http {
  include /usr/local/openresty/nginx/conf/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /opt/project/web_worker/openresty/logs/access.log main;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 0.0.0.0:18787 ssl;
    server_name _;

    ssl_certificate /opt/project/web_worker/openresty/certs/web-worker.crt;
    ssl_certificate_key /opt/project/web_worker/openresty/certs/web-worker.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:WEBWORKERSSL:10m;
    ssl_session_timeout 1d;

    error_page 497 =307 https://$host:18787$request_uri;

    auth_basic "web-worker-shell";
    auth_basic_user_file /opt/project/web_worker/openresty/auth/.htpasswd;

    client_max_body_size 100m;

    location / {
      proxy_pass http://127.0.0.1:8787;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 1d;
      proxy_send_timeout 1d;
      proxy_buffering off;
    }
  }
}
